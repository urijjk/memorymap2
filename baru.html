<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Map | Manado Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --color-peach-dark: #FF9A86;
            --color-peach-light: #FFB399;
            --color-cream-dark: #FFD6A6;
            --color-cream-light: #FFF0BE;
            --color-text: #5C4033;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--color-cream-light); 
            margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
            color: var(--color-text);
        }
        
        h1, h2, h3, h4, button, input, textarea { font-family: 'Poppins', sans-serif; }

        /* Update: Menghapus border putih tebal dan box-shadow agar peta terlihat transparan/menyatu */
        #map-container { 
            flex: 1; 
            margin: 0; /* Menghapus margin agar peta penuh */
            overflow: hidden; 
            position: relative;
            background: transparent; /* Border putih dihapus total di sini */
        }
        
        #map { position: absolute; top: 0; bottom: 0; width: 100%; z-index: 1; }
        
        /* Popup Styling */
        .leaflet-popup-content-wrapper { 
            background: var(--color-cream-light) !important; 
            border-radius: 24px !important; padding: 0 !important; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(92, 64, 51, 0.15) !important; 
        }
        .leaflet-popup-content { margin: 0 !important; width: 280px !important; }
        .leaflet-popup-tip { background: var(--color-cream-light) !important; }
        
        .peach-gradient { background: linear-gradient(135deg, var(--color-peach-dark) 0%, var(--color-peach-light) 100%); }
        .glass-panel { background: rgba(255, 240, 190, 0.96); backdrop-filter: blur(12px); }
        
        .memory-card {
            background: white;
            user-select: none; 
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--color-cream-dark);
        }
        .memory-card:hover { border-color: var(--color-peach-dark); transform: translateY(-2px); }
        .memory-card:active { transform: scale(0.98); }

        .leaflet-container { font-family: 'Poppins', sans-serif !important; }
        
        .heart-marker {
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--color-peach-dark);
            font-size: 28px;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.2));
            transition: transform 0.3s ease;
        }
        .heart-marker:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <nav class="h-20 bg-white/90 backdrop-blur-md shadow-sm border-b border-orange-50 flex items-center justify-between px-6 md:px-12 relative z-[2000]">
        <div class="flex items-center space-x-3">
            <div class="w-11 h-11 peach-gradient rounded-full flex items-center justify-center text-white shadow-lg">
                <i class="fas fa-heart text-lg"></i>
            </div>
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-[#5C4033]">Memory Map</h1>
            </div>
        </div>
        <button onclick="window.toggleSidebar()" class="px-5 py-2.5 bg-[#FF9A86] text-white rounded-full font-semibold hover:bg-[#FFB399] transition-all flex items-center gap-2 shadow-md">
            <i class="fas fa-list-ul"></i> <span>Memory Lane</span>
        </button>
    </nav>

    <main class="flex-grow flex flex-col relative overflow-hidden">
        <div id="map-container"><div id="map"></div></div>

        <div id="sidebar" class="fixed top-20 right-0 h-[calc(100vh-80px)] w-80 md:w-96 glass-panel z-[1500] transform translate-x-full transition-transform duration-500 shadow-2xl overflow-hidden border-l border-orange-100 flex flex-col">
            <div class="p-8 flex-grow overflow-y-auto">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-bold text-[#5C4033]">List Kenangan</h2>
                    <button onclick="window.toggleSidebar()" class="text-[#5C4033]"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div id="memories-list" class="space-y-4 mb-20"></div>
            </div>
            <div class="p-6 bg-white/50 border-t border-orange-100">
                <button onclick="openModal()" class="w-full py-4 peach-gradient text-white rounded-2xl font-bold shadow-lg hover:scale-[1.02] transition-all flex items-center justify-center gap-3">
                    <i class="fas fa-plus-circle text-xl"></i> Tambah Kenangan Baru
                </button>
            </div>
        </div>

        <div id="modal" class="fixed inset-0 bg-[#5C4033]/40 hidden items-center justify-center z-[3000] p-4 backdrop-blur-sm">
            <div class="bg-[#FFF0BE] w-full max-w-md rounded-[2.5rem] shadow-2xl overflow-hidden border-4 border-white max-h-[90vh] overflow-y-auto">
                <div class="peach-gradient p-8 text-white text-center">
                    <h3 id="modal-title" class="text-2xl font-bold">Detail Kenangan</h3>
                    <p class="text-orange-50 text-xs mt-1">Simpan setiap momen perjalanan kita</p>
                </div>
                <form id="memory-form" class="p-8 space-y-4">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1"><label class="text-[10px] font-bold text-[#5C4033] uppercase ml-2">Latitude</label><input type="text" id="lat-input" required class="w-full px-5 py-3 rounded-2xl border-2 border-orange-100 outline-none bg-white text-sm"></div>
                        <div class="space-y-1"><label class="text-[10px] font-bold text-[#5C4033] uppercase ml-2">Longitude</label><input type="text" id="lng-input" required class="w-full px-5 py-3 rounded-2xl border-2 border-orange-100 outline-none bg-white text-sm"></div>
                    </div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-[#5C4033] uppercase ml-2">Nama Tempat</label><input type="text" id="title-input" required class="w-full px-5 py-3 rounded-2xl border-2 border-orange-100 outline-none bg-white"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-[#5C4033] uppercase ml-2">Tanggal Momen</label><input type="date" id="date-input" required class="w-full px-5 py-3 rounded-2xl border-2 border-orange-100 outline-none bg-white"></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-[#5C4033] uppercase ml-2">Deskripsi (Opsional)</label><textarea id="desc-input" rows="2" class="w-full px-5 py-3 rounded-2xl border-2 border-orange-100 outline-none bg-white resize-none"></textarea></div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-[#5C4033] uppercase ml-2">Link Foto URL (Opsional)</label><input type="url" id="image-input" class="w-full px-5 py-3 rounded-2xl border-2 border-orange-100 outline-none bg-white"></div>
                    <div class="flex gap-4 pt-2">
                        <button type="button" onclick="closeModal()" class="flex-1 py-4 font-bold text-[#5C4033]">Batal</button>
                        <button type="submit" class="flex-1 py-4 peach-gradient text-white font-bold rounded-2xl shadow-lg">Simpan!</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        let map;
        // List kenangan tetap lengkap sesuai permintaan
        let memories = [
            { id: 1, name: "Kopi Kenangan Malalayang", date: "2026-05-15", lat: 1.4570002878797836, lng: 124.81065679940096, desc: "", image: "" },
            { id: 2, name: "Coto Babi Samrat", date: "2026-05-15", lat: 1.4810102520473898, lng: 124.83677770978748, desc: "", image: "" },
            { id: 3, name: "Picpix Studio Mantos", date: "2026-05-15", lat: 1.4711279286256354, lng: 124.83122662143397, desc: "", image: "" },
            { id: 4, name: "Fore Megamas", date: "2026-05-15", lat: 1.4826712034012668, lng: 124.83336395026934, desc: "", image: "" },
            { id: 5, name: "Burger King Megamas", date: "2026-05-15", lat: 1.4829427558126018, lng: 124.83296157910463, desc: "", image: "" },
            { id: 6, name: "Pohon Kasih Megamas", date: "2026-05-15", lat: 1.4853482255915516, lng: 124.83092452143389, desc: "", image: "" },
            { id: 7, name: "Redo Coffee Shop", date: "2026-05-15", lat: 1.4891363792624337, lng: 124.84625399444587, desc: "", image: "" },
            { id: 8, name: "RM Podomoro", date: "2026-05-15", lat: 1.4578553833603751, lng: 124.81647000794, desc: "", image: "" },
            { id: 9, name: "Kawaii Cafe", date: "2026-05-15", lat: 1.478264679630787, lng: 124.83349246561068, desc: "", image: "" },
            { id: 10, name: "Fore Tikala", date: "2026-05-15", lat: 1.486277003047819, lng: 124.84929478279948, desc: "", image: "" }
        ];
        let markers = {};

        const heartIcon = L.divIcon({
            html: '<div class="heart-marker"><i class="fas fa-heart"></i></div>',
            className: 'custom-div-icon',
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -15]
        });

        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('translate-x-full');
        
        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('memory-form').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('modal-title').innerText = "Detail Kenangan Baru";
        }

        function openModal(editId = null) {
            if (editId) {
                const m = memories.find(item => item.id == editId);
                document.getElementById('edit-id').value = m.id;
                document.getElementById('lat-input').value = m.lat;
                document.getElementById('lng-input').value = m.lng;
                document.getElementById('title-input').value = m.name;
                document.getElementById('date-input').value = m.date;
                document.getElementById('desc-input').value = m.desc || "";
                document.getElementById('image-input').value = m.image || "";
                document.getElementById('modal-title').innerText = "Edit Kenangan";
            }
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function formatDate(dateStr) {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return new Date(dateStr).toLocaleDateString('id-ID', options);
        }

        function renderAll() {
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};
            document.getElementById('memories-list').innerHTML = "";

            memories.forEach(m => {
                const marker = L.marker([m.lat, m.lng], { icon: heartIcon }).addTo(map);
                
                const popupHTML = `
                    <div class="overflow-hidden">
                        ${m.image ? `<img src="${m.image}" class="w-full h-40 object-cover">` : `<div class="h-24 peach-gradient flex items-center justify-center text-white/30"><i class="fas fa-camera text-3xl"></i></div>`}
                        <div class="p-5">
                            <h4 class="font-bold text-[#5C4033] text-lg leading-tight">${m.name}</h4>
                            <div class="inline-block px-3 py-1 bg-orange-50 text-[#FF9A86] rounded-full text-[10px] font-bold my-2"><i class="far fa-calendar-alt mr-1"></i> ${formatDate(m.date)}</div>
                            ${m.desc ? `<p class="text-[#5C4033] text-xs italic mb-4 opacity-80">"${m.desc}"</p>` : '<div class="mb-2"></div>'}
                            <button onclick="openModal(${m.id})" class="w-full py-2 bg-[#FF9A86] text-white rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-[#FFB399] transition-colors shadow-sm">Edit Kenangan</button>
                        </div>
                    </div>`;

                marker.bindPopup(popupHTML);
                markers[m.id] = marker;

                const card = document.createElement('div');
                card.className = "memory-card p-4 rounded-2xl flex justify-between items-center group";
                card.innerHTML = `
                    <div class="flex-grow pr-4" onclick="map.flyTo([${m.lat}, ${m.lng}], 17); setTimeout(() => markers[${m.id}].openPopup(), 600); if(window.innerWidth < 1024) window.toggleSidebar();">
                        <span class="text-[9px] font-bold text-[#FF9A86] uppercase tracking-widest">${formatDate(m.date)}</span>
                        <h4 class="font-bold text-[#5C4033] text-sm">${m.name}</h4>
                    </div>
                    <button onclick="event.stopPropagation(); if(confirm('Hapus kenangan?')){memories = memories.filter(x => x.id !== ${m.id}); renderAll();}" class="w-9 h-9 flex items-center justify-center text-red-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-all">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                `;
                document.getElementById('memories-list').appendChild(card);
            });
        }

        window.onload = () => {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([1.47, 124.83], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
            renderAll();
        };

        document.getElementById('memory-form').onsubmit = (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const newData = {
                id: editId ? parseInt(editId) : Date.now(),
                name: document.getElementById('title-input').value,
                date: document.getElementById('date-input').value,
                lat: parseFloat(document.getElementById('lat-input').value),
                lng: parseFloat(document.getElementById('lng-input').value),
                desc: document.getElementById('desc-input').value.trim(),
                image: document.getElementById('image-input').value.trim()
            };
            if (editId) {
                const index = memories.findIndex(m => m.id == editId);
                memories[index] = newData;
            } else {
                memories.push(newData);
            }
            renderAll();
            closeModal();
            map.flyTo([newData.lat, newData.lng], 17);
        };
    </script>
</body>
</html>
